<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lógica com JavaScript</title>
</head>
<body>

<script>
let soma = 0;
for(let i = 1; i <= 10; i++)
{
    let num = Number(prompt("Digite um número."));
    soma = soma + num;
}

alert(`A soma desses números é ${soma}`);
</script>

</body>
</html>
