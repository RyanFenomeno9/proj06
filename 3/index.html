<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lógica com JavaScript</title>
</head>
<body>

<script>
let num = Number(prompt("Digite um número aleatório"));
let tab = "";
let v = 0;

for(let i = 1; i <=10; i++)
{
    v = i*num;
    tab = `${tab}\n ${v}`;
}

alert(`A tabuada do seu número é: ${tab}`);
</script>

</body>
</html>
