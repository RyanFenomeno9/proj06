<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lógica com JavaScript</title>
</head>
<body>

<script>
    const num = Number(prompt("Digite um número aleatório"));
    let msg = "";

for( let i = 0; i <= num; i++)
{
    msg = `${msg} ${i}`;
}

alert(`${msg}`);
</script>

</body>
</html>
